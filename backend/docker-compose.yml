version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: spendwise_db
    environment:
      POSTGRES_USER: spendwise_user
      POSTGRES_PASSWORD: spendwise_password
      POSTGRES_DB: spendwise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
