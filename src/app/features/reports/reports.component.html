<div class="reports-container">
  <h1>Reports</h1>
  
  <mat-card class="report-card">
    <mat-card-header>
      <mat-card-title>Data Export</mat-card-title>
      <mat-card-subtitle>Download your financial data for external analysis</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="report-actions">
      <button mat-raised-button color="primary" (click)="exportToCSV()">
        <mat-icon>download</mat-icon> Export Expenses (CSV)
      </button>
    </mat-card-content>
  </mat-card>
</div>
