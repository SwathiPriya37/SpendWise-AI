<div class="goals-container">
  <div class="header">
    <h1>Savings Goals</h1>
    <button mat-raised-button color="primary" (click)="openAddGoalDialog()">
      <mat-icon>add</mat-icon> Add Goal
    </button>
  </div>
  
  <div class="goals-grid" *ngIf="goals$ | async as goals">
    <mat-card class="goal-card" *ngFor="let goal of goals">
      <mat-card-header>
        <mat-card-title>{{ goal.title }}</mat-card-title>
        <mat-card-subtitle>
          Target: {{ goal.targetAmount | currency }} | Deadline: {{ goal.deadline | date }}
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="progress-info">
          <span>{{ goal.currentAmount | currency }} Saved</span>
          <span>{{ getCompletionPercentage(goal.currentAmount, goal.targetAmount) | number:'1.0-0' }}%</span>
        </div>
        <mat-progress-bar 
          mode="determinate" 
          [value]="getCompletionPercentage(goal.currentAmount, goal.targetAmount)"
          color="accent">
        </mat-progress-bar>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary" (click)="editGoal(goal)">Edit</button>
        <button mat-button color="warn" (click)="deleteGoal(goal.id)">Delete</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
