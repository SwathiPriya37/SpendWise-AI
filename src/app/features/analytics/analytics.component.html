<div class="analytics-container">
  <h1>Analytics</h1>
  
  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Income vs Expenses</mat-card-title>
    </mat-card-header>
    <mat-card-content class="chart-content">
      <canvas baseChart
        [data]="barChartData"
        [options]="barChartOptions"
        [type]="'bar'">
      </canvas>
    </mat-card-content>
  </mat-card>
</div>
